name: Deploy Carfolio

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site with a fresh cache version
        run: |
          VERSION="${GITHUB_SHA::8}"
          echo "Stamping service worker with cache version: $VERSION"
          mkdir -p _site
          cp index.html manifest.json _site/
          cp -r css js icons _site/
          cp service-worker.js _site/service-worker.js
          sed -i "s/__CACHE_VERSION__/${VERSION}/" _site/service-worker.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
